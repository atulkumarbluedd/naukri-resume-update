name: Update Naukri Resume

on:
  schedule:
    # 8:30 AM IST = 03:00 UTC
    - cron: '0 3 * * *'

    # 1:00 PM IST = 07:30 UTC
    - cron: '30 7 * * *'

    # 6:30 PM IST = 13:00 UTC
    - cron: '0 13 * * *'

  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run update script
        env:
          USER: ${{ secrets.NAUKRI_USERNAME }}
          PASS: ${{ secrets.NAUKRI_PASSWORD }}
          FILE_ID: ${{ secrets.FILE_ID }}
          FORM_KEY: ${{ secrets.FORM_KEY }}
        run: |
          python updateResume.py